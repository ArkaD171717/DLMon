name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Python/OS sweep (latest torch)
          - {os: ubuntu-latest, python-version: "3.10"}
          - {os: ubuntu-latest, python-version: "3.11"}
          - {os: ubuntu-latest, python-version: "3.12"}
          - {os: ubuntu-latest, python-version: "3.13"}
          - {os: windows-latest, python-version: "3.10"}
          - {os: windows-latest, python-version: "3.11"}
          - {os: windows-latest, python-version: "3.12"}
          - {os: windows-latest, python-version: "3.13"}
          # Torch version sweep (ubuntu, Python 3.11)
          - {os: ubuntu-latest, python-version: "3.11", torch-pin: "torch>=2.2,<2.3"}
          - {os: ubuntu-latest, python-version: "3.11", torch-pin: "torch>=2.4,<2.5"}
          - {os: ubuntu-latest, python-version: "3.12", torch-pin: "torch>=2.5,<2.6"}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Pin torch version
        if: matrix.torch-pin
        run: pip install "${{ matrix.torch-pin }}" --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v
